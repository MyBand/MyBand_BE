services:

  app:
    build: .
    expose:
      - "3000"          # nginx에서만 접근 — 외부에 직접 노출하지 않음
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "file:./app.db"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_WEB_CLIENT_ID: "${GOOGLE_WEB_CLIENT_ID:-}"
      GOOGLE_ANDROID_CLIENT_ID: "${GOOGLE_ANDROID_CLIENT_ID:-}"
      GOOGLE_IOS_CLIENT_ID: "${GOOGLE_IOS_CLIENT_ID:-}"
      GOOGLE_CLIENT_IDS: "${GOOGLE_CLIENT_IDS:-}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      FRONTEND_URL: "${FRONTEND_URL:-}"
      FRONTEND_URLS: "${FRONTEND_URLS:-}"
      BASE_URL: "${BASE_URL:-}"
      ADMIN_SECRET: "${ADMIN_SECRET:-}"
    volumes:
      - db_data:/app/prisma
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./config/ssl:/etc/ssl-export
    entrypoint: /bin/sh -c
      'trap exit TERM;
       while :; do
         certbot renew --quiet
           --deploy-hook "cp /etc/letsencrypt/live/pagomnini.kro.kr/fullchain.pem /etc/ssl-export/cert.pem
                       && cp /etc/letsencrypt/live/pagomnini.kro.kr/privkey.pem   /etc/ssl-export/key.pem";
         sleep 12h & wait $${!};
       done;'
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
  certbot_conf:
  certbot_www:
